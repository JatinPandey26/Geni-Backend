name: CI

on:
  push:
    branches: [ "**" ]          # every branch
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB:       geni
          POSTGRES_USER:     geni
          POSTGRES_PASSWORD: geni
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven              # caches ~/.m2 between runs — faster builds

      - name: Build and test
        env:
          SPRING_PROFILES_ACTIVE: ci
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/geni
          SPRING_DATASOURCE_USERNAME: geni
          SPRING_DATASOURCE_PASSWORD: geni
        run: mvn clean verify

      - name: Upload test results
        if: failure()               # only upload on failure — save storage
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/