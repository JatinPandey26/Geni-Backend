# application-ci.properties
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# GitHub App ? fake values for CI, real tests should mock this
geni.connectors.github.app-id=123456
geni.connectors.github.app-name=geni-test
geni.connectors.github.webhook-secret=test-secret
geni.connectors.github.private-key-path=classpath:github/private-key-pkcs8.pem

# encryption key ? fake, just needs to be valid base64 32 bytes
geni.encryption.key=dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXQ=